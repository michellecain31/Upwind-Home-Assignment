services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:

      - ./PenguWave-main/data/mock_events.json:/app/data/mock_events.json
    restart: unless-stopped

  frontend:
    build: ./PenguWave-main
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped